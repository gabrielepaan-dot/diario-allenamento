<style>
/* ============================================================
   DESIGN TOKENS — stessa famiglia estetica del Calcolatore carichi
   ============================================================ */
:root{
  --ardesia:#1C1F22;
  --ardesia-alta:#24282C;
  --ardesia-bordo:#33383D;
  --magnesite:#F2EFE9;
  --magnesite-attenuata:#B9B6AF;
  --arancio:#E8622C;
  --muschio:#5B7A6E;
  --roccia:#3E6B8A;
  --rosso:#B3261E;
  --font-display:'Barlow Condensed', sans-serif;
  --font-body:'Inter', sans-serif;
  --radius:10px;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--ardesia);
  color:var(--magnesite);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
}
h1,h2,h3,.numero{
  font-family:var(--font-display);
  font-weight:600;
  letter-spacing:0.01em;
}
button{
  font-family:var(--font-body);
  cursor:pointer;
}
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible{
  outline:2px solid var(--arancio);
  outline-offset:2px;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

/* Header */
.topbar{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px calc(10px + env(safe-area-inset-top));
  padding-top:calc(14px + env(safe-area-inset-top));
  background:var(--ardesia);
  border-bottom:1px solid var(--ardesia-bordo);
}
.topbar h1{font-size:22px; margin:0; color:var(--magnesite);}
.stato-connessione{
  display:flex; align-items:center; gap:6px; font-size:12px; color:var(--magnesite-attenuata);
}
.puntino{width:8px; height:8px; border-radius:50%; background:var(--muschio);}
.puntino.offline{background:var(--rosso);}
.icona-btn{
  background:none; border:none; color:var(--magnesite); font-size:20px; padding:6px;
  border-radius:8px; line-height:1;
}
.icona-btn:hover{background:var(--ardesia-alta);}

/* Layout viste */
main{padding:16px; max-width:640px; margin:0 auto;}
.vista{display:none;}
.vista.attiva{display:block;}

.card{
  background:var(--ardesia-alta);
  border:1px solid var(--ardesia-bordo);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:12px;
}
.card h3{margin:0 0 8px; font-size:17px;}

.riga-form{display:flex; flex-direction:column; gap:4px; margin-bottom:12px;}
.riga-form label{font-size:13px; color:var(--magnesite-attenuata);}
input, select, textarea{
  background:var(--ardesia);
  border:1px solid var(--ardesia-bordo);
  color:var(--magnesite);
  border-radius:8px;
  padding:10px 12px;
  font-size:15px;
  font-family:var(--font-body);
}
input:disabled, select:disabled{opacity:0.5;}
textarea{resize:vertical; min-height:60px;}

.btn{
  border:none; border-radius:8px; padding:11px 16px; font-size:15px; font-weight:600;
  background:var(--roccia); color:var(--magnesite);
}
.btn.primario{background:var(--arancio);}
.btn.secondario{background:transparent; border:1px solid var(--ardesia-bordo); color:var(--magnesite);}
.btn.pericolo{background:var(--rosso);}
.btn.blocco{width:100%;}
.btn:disabled{opacity:0.45; cursor:not-allowed;}

.badge{
  display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px;
  background:var(--roccia); color:var(--magnesite);
}
.badge.scheda{background:var(--muschio);}

/* Macrociclo: calcolatore zavorra + agenda Trazioni a pillole */
.calcolatore-zavorra{
  background:var(--ardesia-alta); border:1px solid var(--ardesia-bordo);
  border-radius:var(--radius); margin-bottom:16px; overflow:hidden;
}
.calcolatore-zavorra .cz-header{
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 14px; cursor:pointer;
}
.calcolatore-zavorra .cz-titolo{font-family:var(--font-display); font-size:16px; font-weight:600;}
.calcolatore-zavorra .cz-base{font-size:11px; color:var(--magnesite-attenuata); margin-top:2px;}
.calcolatore-zavorra .cz-chevron{color:var(--magnesite-attenuata); font-size:12px; transition:transform 0.15s;}
.calcolatore-zavorra.chiuso .cz-chevron{transform:rotate(180deg);}
.calcolatore-zavorra.chiuso .cz-body{display:none;}
.cz-body{
  display:grid; grid-template-columns:repeat(3,1fr); gap:1px;
  background:var(--ardesia-bordo); border-top:1px solid var(--ardesia-bordo);
}
.cz-cella{background:var(--ardesia-alta); padding:9px 6px; text-align:center;}
.cz-cella .cz-perc{font-size:11px; color:var(--magnesite-attenuata); margin-bottom:2px;}
.cz-cella .cz-val{font-family:var(--font-display); font-size:19px; font-weight:600;}
.cz-cella .cz-unita{font-size:10px; color:var(--magnesite-attenuata); margin-left:2px;}

.agenda-trazioni{
  background:var(--ardesia-alta); border:1px solid var(--ardesia-bordo);
  border-radius:var(--radius); padding:2px 14px;
}
.riga-settimana-agenda{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:12px 0; border-bottom:1px solid var(--ardesia-bordo);
}
.riga-settimana-agenda:last-child{border-bottom:none;}
.riga-settimana-agenda .rsa-data{font-size:13px; color:var(--magnesite-attenuata); flex-shrink:0;}
.riga-settimana-agenda.corrente .rsa-data{color:var(--magnesite); font-weight:600;}
.rsa-pillole{display:flex; gap:6px; flex:1; justify-content:flex-end; min-width:0;}
.pillola-agenda{
  border-radius:20px; padding:6px 12px; font-size:12px; max-width:150px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  border:1px solid var(--ardesia-bordo); background:transparent; color:var(--magnesite-attenuata);
  font-family:var(--font-body); cursor:pointer;
}
.pillola-agenda.vuota{border-style:dashed;}
.pillola-agenda.pianificata{border-color:var(--arancio); color:var(--magnesite); background:rgba(232,98,44,0.12);}
.pillola-agenda.fatta{border-color:var(--muschio); color:var(--magnesite); background:rgba(91,122,110,0.18);}

.vuoto{
  text-align:center; color:var(--magnesite-attenuata); padding:32px 12px; font-size:14px;
}

/* Diario */
.blocco-giorno{
  border-left:3px solid var(--colore-giorno, var(--ardesia-bordo));
  padding-left:10px;
  margin:0 0 20px;
}
.blocco-giorno:first-child{margin-top:2px;}
.intestazione-giorno{
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--font-display); font-size:13px; font-weight:600;
  color:var(--magnesite); background:var(--colore-giorno, var(--ardesia-bordo));
  text-transform:uppercase; letter-spacing:0.04em;
  padding:3px 6px 3px 10px; border-radius:20px;
  margin:0 0 8px;
}
.btn-piu-giorno{
  width:18px; height:18px; border-radius:50%; border:none; cursor:pointer;
  background:rgba(0,0,0,0.18); color:var(--magnesite); font-size:13px; line-height:1;
  display:flex; align-items:center; justify-content:center; padding:0;
}
.btn-piu-giorno:hover{background:rgba(0,0,0,0.32);}
.intestazione-categoria{
  font-family:var(--font-display); font-size:15px; font-weight:600;
  color:var(--magnesite); text-transform:uppercase; letter-spacing:0.04em;
  margin:18px 2px 8px; display:flex; align-items:center; gap:8px;
}
.intestazione-categoria:first-child{margin-top:2px;}
.pallino-categoria{width:10px; height:10px; border-radius:50%; flex-shrink:0; display:inline-block;}
.griglia-colori{display:flex; flex-wrap:wrap; gap:8px; padding:4px 0;}
.swatch-colore{
  width:32px; height:32px; border-radius:50%; border:2px solid transparent; padding:0;
}
.swatch-colore.selezionato{border-color:var(--magnesite);}
.voce-log{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
.voce-log .dettagli{flex:1;}
.voce-log .data-num{font-family:var(--font-display); font-size:20px; color:var(--arancio); min-width:52px;}
.voce-log .azioni{display:flex; gap:4px;}
.voce-log .nota{font-size:13px; color:var(--magnesite-attenuata); margin-top:4px; font-style:italic;}

/* Griglia aderenza */
.tabella-griglia{width:100%; border-collapse:collapse; font-size:12px;}
.tabella-griglia th{
  font-weight:500; color:var(--magnesite-attenuata); padding:4px 2px; text-align:center;
}
.tabella-griglia td{padding:4px 2px; text-align:center; border-top:1px solid var(--ardesia-bordo);}
.tabella-griglia .nome-esercizio{text-align:left; padding-right:8px;}
.stato-cella{
  display:inline-block; padding:4px 8px; border-radius:8px; font-size:11px; font-weight:600; color:var(--ardesia);
  white-space:nowrap;
}

/* Grafici */
.toggle-periodo{display:flex; gap:8px; margin-bottom:12px;}
.toggle-periodo button{flex:1;}
.toggle-periodo button.attivo{background:var(--arancio); color:var(--magnesite);}
.grafico-svg{width:100%; height:auto; display:block;}
.etichetta-parziale{font-size:11px; fill:var(--magnesite-attenuata);}
.grafico-svg-cont{position:relative;}
.scroll-grafico{overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px;}
.grafico-svg-sessione{height:auto; display:block;}
.tooltip-grafico{
  position:absolute; transform:translate(-50%,-100%) translateY(-8px);
  background:var(--magnesite); color:var(--ardesia); font-family:var(--font-display);
  font-weight:600; font-size:13px; padding:4px 9px; border-radius:6px; white-space:nowrap;
  pointer-events:none; z-index:6;
}
.tooltip-grafico::after{
  content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
  border:5px solid transparent; border-top-color:var(--magnesite);
}

/* Scheda */
.nav-settimana{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.nav-settimana .numero{font-size:19px;}

/* Tab bar inferiore */
.tabbar{
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  display:flex;
  background:var(--ardesia-alta);
  border-top:1px solid var(--ardesia-bordo);
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-btn{
  flex:1; background:none; border:none; color:var(--magnesite-attenuata);
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:9px 4px 8px; font-size:11px;
}
.tab-btn .ic{font-size:19px;}
.tab-btn.attivo{color:var(--arancio);}

/* Modale */
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:30;
  display:none; align-items:flex-end; justify-content:center;
}
.overlay.aperto{display:flex;}
.modale{
  background:var(--ardesia-alta); width:100%; max-width:640px;
  border-radius:16px 16px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom));
  max-height:88vh; overflow-y:auto;
}
.modale h2{margin:0 0 14px; font-size:19px;}
.avviso-box{
  background:rgba(232,98,44,0.12); border:1px solid var(--arancio); border-radius:8px;
  padding:10px 12px; font-size:13px; margin-bottom:12px;
}
.errore-box{
  background:rgba(179,38,30,0.15); border:1px solid var(--rosso); border-radius:8px;
  padding:10px 12px; font-size:13px; margin-bottom:12px;
}

.legenda{display:flex; gap:12px; flex-wrap:wrap; font-size:11px; color:var(--magnesite-attenuata); margin-top:10px;}
.legenda span{display:flex; align-items:center; gap:4px;}
.legenda i{width:10px; height:10px; border-radius:50%; display:inline-block;}
</style>
</head>
<body>

    <div style="display:flex; gap:8px; margin-bottom:14px;">

<script>
/* ============================================================
   CONFIGURAZIONE — da compilare dopo la creazione del progetto Supabase
   ============================================================ */
const SUPABASE_URL = 'https://zqiodtllewdyulrppaym.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_eKnMD4oUHIuLqI69XKzMOg_2mmANFFX';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ============================================================
   COSTANTI — soglie gradiente griglia di aderenza (commentate)
   ratio = giorni_trascorsi_dall_ultimo_log / target_giorni
   ratio <= 1        -> interpola MUSCHIO -> ARANCIO
   1 < ratio <= 2     -> interpola ARANCIO -> ROSSO
   ratio > 2          -> ROSSO pieno (clamp)
   nessun log mai     -> colore dedicato ROCCIA (stato "mai fatto")
   ============================================================ */
const SOGLIA_ROSSO_PIENO = 2.0;
const COLORE_MUSCHIO = [91, 122, 110];
const COLORE_OCRA    = [201, 162, 39];
const COLORE_ARANCIO = [232, 98, 44];
const COLORE_ROSSO   = [179, 38, 30];
const COLORE_ROCCIA  = [62, 107, 138];
const TIMEZONE = 'Europe/Rome';

/* ============================================================
   UTILITY: date/fuso orario Europe/Rome (hardcoded)
   ============================================================ */
function oggiISO(){
  const fmt = new Intl.DateTimeFormat('en-CA', { timeZone: TIMEZONE, year:'numeric', month:'2-digit', day:'2-digit' });
  return fmt.format(new Date());
}
function dataDaISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(Date.UTC(y,m-1,d)); }
function isoDaData(d){ return d.toISOString().slice(0,10); }
function aggiungiGiorni(iso, n){ const d=dataDaISO(iso); d.setUTCDate(d.getUTCDate()+n); return isoDaData(d); }
function differenzaGiorni(a,b){ return Math.round((dataDaISO(b)-dataDaISO(a))/86400000); }
function lunediSettimana(iso){
  const d = dataDaISO(iso);
  const gs = d.getUTCDay();
  const offset = gs === 0 ? 6 : gs - 1;
  d.setUTCDate(d.getUTCDate()-offset);
  return isoDaData(d);
}
function primoGiornoMese(iso){ return iso.slice(0,7)+'-01'; }
function formattaBreve(iso){ const d=dataDaISO(iso); return `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}`; }
const NOMI_MESI = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];

/* Sposta una chiave di periodo (lunedì della settimana, o giorno 1 del mese) di
   `offset` settimane/mesi. offset negativo = indietro. */
function spostaPeriodo(bucket, chiave, offset){
  if(bucket==='settimana') return aggiungiGiorni(chiave, offset*7);
  const [y,m] = chiave.split('-').map(Number);
  const d = new Date(Date.UTC(y, m-1+offset, 1));
  return isoDaData(d).slice(0,7)+'-01';
}
/* Confini [inizio,fine] (incluso) della settimana/mese identificato da `chiave`. */
function confiniPeriodo(bucket, chiave){
  if(bucket==='settimana') return { inizio: chiave, fine: aggiungiGiorni(chiave, 6) };
  const [y,m] = chiave.split('-').map(Number);
  const ultimoGiorno = new Date(Date.UTC(y, m, 0)).getUTCDate();
  return { inizio: chiave, fine: `${chiave.slice(0,8)}${String(ultimoGiorno).padStart(2,'0')}` };
}
function etichettaPeriodo(bucket, chiave){
  if(bucket==='settimana'){ return `${formattaBreve(chiave)} - ${formattaBreve(aggiungiGiorni(chiave,6))}`; }
  const meseIdx = parseInt(chiave.slice(5,7),10)-1;
  return `${NOMI_MESI[meseIdx]} ${chiave.slice(0,4)}`;
}

/* ============================================================
   UTILITY: retry + timeout per chiamate Supabase
   ============================================================ */
async function conRetry(fnPromiseFactory, tentativi=3, timeoutMs=8000){
  let ultimoErrore;
  for(let i=0;i<tentativi;i++){
    try{
      const risultato = await Promise.race([
        fnPromiseFactory(),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')), timeoutMs))
      ]);
      if(risultato && risultato.error) throw risultato.error;
      impostaConnessione(true);
      return risultato;
    }catch(e){
      ultimoErrore = e;
      await new Promise(r=>setTimeout(r, 400*(i+1)));
    }
  }
  impostaConnessione(false);
  throw ultimoErrore;
}
function impostaConnessione(ok){
  document.getElementById('puntinoConnessione').classList.toggle('offline', !ok);
  document.getElementById('testoConnessione').textContent = ok ? 'online' : 'connessione assente';
}

/* ============================================================
   STATO GLOBALE
   ============================================================ */
const stato = {
  vistaCorrente: 'diario',
  esercizi: [],
  categorie: [],
  filtroLibreria: 'attivi',
  numeroSettimanePassateCaricate: 8, // agenda Macrociclo: quante settimane passate sono attualmente visibili

/* Config attuale (tmax/smax/peso corporeo) e relativo storico, con cache semplice
   invalidata ogni volta che si salva in Impostazioni. */
async function caricaConfig(){
  if(stato.config) return stato.config;
  const r = await conRetry(()=> sb.from('config').select('*').eq('id',1).single());
  stato.config = r.data || {};
  return stato.config;
}
async function caricaConfigStorico(){
  if(stato.configStorico) return stato.configStorico;
  const r = await conRetry(()=> sb.from('config_storico').select('*').order('data'));
  stato.configStorico = r.data || [];
  return stato.configStorico;
}
/* Trova il valore di `campo` (tmax|smax|peso) valido alla data indicata, cercando
   nello storico l'ultima riga con data <= dataISO. Se non c'è nulla di storicizzato
   per quella data (tipicamente sessioni precedenti all'inizio della storicizzazione),
   ricade sul valore attuale e lo marca come stima. */
function valoreStoricoADATA(storico, campo, dataISO, fallback){
  let valore = null, trovato = false;
  for(const riga of storico){
    if(riga.data > dataISO) break;
    if(riga[campo] != null){ valore = riga[campo]; trovato = true; }
  }
  if(trovato) return { valore, stima:false };
  return { valore: fallback, stima: true };
}

async function renderDiario(){
  const cont = document.getElementById('listaLog');
  cont.innerHTML = '<div class="vuoto">Caricamento…</div>';
  await caricaEsercizi();
  const r = await conRetry(()=> sb.from('log_sessioni')
    .select('*, esercizi(nome, tipo)')
    .eq('eliminato', false)
    .order('data', {ascending:false})
    .order('created_at', {ascending:false})
    .limit(200));
  const log = r.data || [];
  if(log.length===0){ cont.innerHTML = '<div class="vuoto">Nessuna sessione registrata. Tocca "+ Nuova sessione" per iniziare.</div>'; return; }

  // Raggruppamento per giorno: mantiene l'ordine (log già ordinato per data desc)
  const gruppi = [];
  for(const v of log){
    let g = gruppi[gruppi.length-1];
    if(!g || g.data !== v.data){ g = { data: v.data, voci: [] }; gruppi.push(g); }
    g.voci.push(v);
  }
  cont.innerHTML = gruppi.map((g,i) => `
    <div class="blocco-giorno" style="--colore-giorno:${coloreGiorno(g.data, i)};">
      <div class="intestazione-giorno">
        <span>${etichettaGiorno(g.data)}</span>
        <button type="button" class="btn-piu-giorno" data-giorno="${g.data}" title="Aggiungi una sessione a questo giorno" aria-label="Aggiungi una sessione a questo giorno">+</button>
      </div>
      ${g.voci.map(voceLogHtml).join('')}
    </div>
  `).join('');
  cont.querySelectorAll('.btn-piu-giorno').forEach(btn=>{
    btn.addEventListener('click', ()=> apriFormLog(null, btn.dataset.giorno));
  });
  log.forEach(v=>{
    document.getElementById('modifica-'+v.id)?.addEventListener('click', ()=> apriFormLog(v));
    document.getElementById('elimina-'+v.id)?.addEventListener('click', ()=> eliminaLog(v));
  });
}
function coloreGiorno(iso, indice){
  // "Oggi" spicca sempre con l'accento arancio; i giorni precedenti alternano due colori
  // della palette così, scorrendo la lista, il confine tra un giorno e l'altro si vede a colpo d'occhio.
  if(iso === oggiISO()) return 'var(--arancio)';
  return indice % 2 === 0 ? 'var(--muschio)' : 'var(--roccia)';
}
const GIORNI_SETTIMANA = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
function etichettaGiorno(iso){
  const oggi = oggiISO();
  if(iso === oggi) return 'Oggi';
  if(iso === aggiungiGiorni(oggi, -1)) return 'Ieri';
  const d = dataDaISO(iso);
  const nomeGiorno = GIORNI_SETTIMANA[d.getUTCDay()];
  return `${formattaBreve(iso)} · ${nomeGiorno}`;
}
function voceLogHtml(v){
  const nomeEs = v.esercizi?.nome || '—';
  const tipo = v.esercizi?.tipo;
  const etichettaSpecialita = v.specialita ? SPECIALITA_ARRAMPICATA.find(s=>s.valore===v.specialita)?.etichetta : null;
  const dettagliValore = tipo==='carico'
    ? `${v.peso ?? '?'} kg × ${v.serie ?? '?'}×${v.ripetizioni ?? '?'}`
    : (v.rpe != null ? `${etichettaSpecialita ? etichettaSpecialita+' · ' : ''}RPE ${v.rpe}/10` : (v.fatto ? 'Fatto' : 'Non fatto'));
  return `
  <div class="card voce-log">
    <div class="dettagli">
      <div><strong>${nomeEs}</strong> ${v.origine==='da_scheda' ? '<span class="badge scheda">da scheda</span>' : ''}</div>
      <div>${dettagliValore}</div>
      ${v.nota ? `<div class="nota">${escapeHtml(v.nota)}</div>` : ''}
    </div>
    <div class="azioni">

      <button class="icona-btn" id="modifica-${v.id}" aria-label="Modifica">&#9998;</button>
      <button class="icona-btn" id="elimina-${v.id}" aria-label="Elimina">&#128465;</button>
    </div>
  </div>`;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Prova a condividere il file con lo share-sheet nativo (su Android permette di scegliere
// "Salva su Drive", WhatsApp, Files, ecc. direttamente). Se non è supportato o l'utente
// annulla, scarica comunque il file normalmente nella cartella Download.
async function condividiOScarica(nomeFile, contenuto, mimeType){
  try{
    const file = new File([contenuto], nomeFile, {type: mimeType});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title: nomeFile});
      return;
    }
  }catch(e){
    if(e.name==='AbortError') return; // l'utente ha chiuso il pannello di condivisione: va bene così
  }
  const blob = new Blob([contenuto], {type: mimeType});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nomeFile;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=> URL.revokeObjectURL(url), 5000);
}

async function ultimoLogPerEsercizio(esercizioId){
  if(!stato.cacheUltimoLog) stato.cacheUltimoLog = {};
  if(esercizioId in stato.cacheUltimoLog) return stato.cacheUltimoLog[esercizioId];
  const r = await conRetry(()=> sb.from('log_sessioni').select('peso, serie, ripetizioni, data').eq('esercizio_id', esercizioId).eq('eliminato', false).order('data', {ascending:false}).limit(1));
  const ultimo = (r.data && r.data[0]) || null;
  stato.cacheUltimoLog[esercizioId] = ultimo;
  return ultimo;
}
async function precompilaDaUltimaVolta(esercizioId){
  const ultimo = await ultimoLogPerEsercizio(esercizioId);
  if(!ultimo) return;
  const selEsercizio = document.getElementById('fEsercizio');
  const inputPeso = document.getElementById('fPeso');
  if(!selEsercizio || selEsercizio.value !== esercizioId || !inputPeso) return; // form chiuso o esercizio cambiato nel frattempo
  const inputSerie = document.getElementById('fSerie');
  const inputRip = document.getElementById('fRipetizioni');
  if(inputPeso.value === '') inputPeso.value = ultimo.peso ?? '';
  if(inputSerie && inputSerie.value === '') inputSerie.value = ultimo.serie ?? '';
  if(inputRip && inputRip.value === '') inputRip.value = ultimo.ripetizioni ?? '';
  const cont = document.getElementById('campiCondizionati');
  if(cont && !document.getElementById('etichettaUltimaVolta')){
    const etichetta = document.createElement('div');
    etichetta.id = 'etichettaUltimaVolta';
    etichetta.style.cssText = 'font-size:12px; color:var(--magnesite-attenuata); margin-top:-4px; margin-bottom:8px;';
    etichetta.textContent = `Precompilato dall'ultima volta (${formattaBreve(ultimo.data)}) — modifica pure i valori.`;
    cont.appendChild(etichetta);
  }
}
function apriFormLog(voceEsistente, dataIniziale){
  // Arrampicata sempre in cima alla lista (è l'esercizio più frequente), il resto
  // mantiene l'ordine alfabetico già garantito dalla query in caricaEsercizi (sort stabile).
  const eserciziAttivi = stato.esercizi.filter(e=>!e.archiviato).sort((a,b)=>{
    if(a.nome==='Arrampicata') return -1;
    if(b.nome==='Arrampicata') return 1;
    return 0;
  });
  const bloccaEsercizio = voceEsistente && voceEsistente.origine==='da_scheda';
  const esSelezionatoId = voceEsistente?.esercizio_id || (eserciziAttivi[0]?.id || '');
  const dataDefault = voceEsistente?.data || dataIniziale || oggiISO();
  apriModale(`
    <h2>${voceEsistente ? 'Modifica sessione' : 'Nuova sessione'}</h2>
    ${bloccaEsercizio ? '<div class="avviso-box">Log collegato a una prescrizione della Scheda: l\'esercizio non è modificabile qui.</div>' : ''}
    <div class="riga-form">
      <label for="fEsercizio">Esercizio</label>
      <select id="fEsercizio" ${bloccaEsercizio?'disabled':''}>
        ${eserciziAttivi.map(e=>`<option value="${e.id}" ${e.id===esSelezionatoId?'selected':''}>${e.nome}</option>`).join('')}
      </select>
    </div>
    <div class="riga-form"><label for="fData">Data</label><input type="date" id="fData" value="${dataDefault}"></div>
    <div id="campiCondizionati"></div>
    <div class="riga-form"><label for="fNota">Nota (opzionale)</label><textarea id="fNota">${voceEsistente?.nota ? escapeHtml(voceEsistente.nota) : ''}</textarea></div>
    <div class="errore-box" id="erroreForm" style="display:none;"></div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn secondario" style="flex:1" id="fAnnulla">Annulla</button>
      ${voceEsistente
        ? `<button class="btn primario" style="flex:1" id="fSalva">Salva</button>`
        : `<button class="btn secondario" style="flex:1.4" id="fSalvaAltro">Salva e aggiungi un altro</button>
           <button class="btn primario" style="flex:1" id="fSalva">Salva e chiudi</button>`
      }
    </div>
  `);
  function renderCampiCondizionati(){
    const es = esercizioPerId(document.getElementById('fEsercizio').value) || eserciziAttivi[0];
    const cont = document.getElementById('campiCondizionati');
    if(!es) { cont.innerHTML=''; return; }
    if(es.tipo==='carico'){
      const eZavorra = !!es.sottrai_peso_corporeo;
      cont.innerHTML = `
        <div class="riga-form"><label for="fPeso">${eZavorra ? 'Zavorra (kg)' : 'Peso (kg)'}</label><input type="number" step="0.5" id="fPeso" value="${voceEsistente?.peso ?? ''}"></div>
        <div class="riga-form"><label for="fSerie">Serie</label><input type="number" id="fSerie" value="${voceEsistente?.serie ?? ''}"></div>
        <div class="riga-form"><label for="fRipetizioni">Ripetizioni</label><input type="number" id="fRipetizioni" value="${voceEsistente?.ripetizioni ?? ''}"></div>
        ${eZavorra ? '<div id="fTotaleStimato" style="font-size:12px; color:var(--magnesite-attenuata); margin-top:-6px;"></div>' : ''}
      `;
      if(!voceEsistente) precompilaDaUltimaVolta(es.id);
      if(eZavorra){
        caricaConfig().then(cfg=>{
          const inputPeso = document.getElementById('fPeso');
          const box = document.getElementById('fTotaleStimato');
          if(!inputPeso || !box) return;
          const aggiornaTotale = ()=>{
            const z = parseFloat(inputPeso.value);
            box.textContent = (!isNaN(z) && cfg.peso!=null) ? `Totale stimato: ${(z+cfg.peso).toFixed(1)} kg (corpo ${cfg.peso}kg + zavorra)` : '';
          };
          inputPeso.addEventListener('input', aggiornaTotale);
          aggiornaTotale();
        });
      }
    } else if(es.traccia_rpe){
      const rpeAttuale = voceEsistente?.rpe ?? '';
      const richiedeSpecialita = es.nome === 'Arrampicata';
      const specialitaAttuale = voceEsistente?.specialita || '';
      cont.innerHTML = `
        ${richiedeSpecialita ? `
        <div class="riga-form">
          <label>Specialità</label>
          <div class="toggle-periodo" id="gruppoSpecialita">
            ${SPECIALITA_ARRAMPICATA.map(s=>`<button type="button" class="btn secondario ${specialitaAttuale===s.valore?'attivo':''}" data-specialita="${s.valore}">${s.etichetta}</button>`).join('')}
          </div>
        </div>` : ''}
        <div class="riga-form">
          <label for="fRpe">Impegno percepito (RPE)</label>
          <select id="fRpe">
            <option value="" ${rpeAttuale===''?'selected':''} disabled>Seleziona da 1 a 10…</option>
            ${Array.from({length:19}, (_,i)=>(2+i)/2).map(n=>`<option value="${n}" ${String(rpeAttuale)===String(n)?'selected':''}>${n}</option>`).join('')}
          </select>

      if(richiedeSpecialita){
        document.querySelectorAll('#gruppoSpecialita button').forEach(b=>{
          b.addEventListener('click', ()=>{
            document.querySelectorAll('#gruppoSpecialita button').forEach(x=>x.classList.remove('attivo'));

          });
        });
      }

      cont.innerHTML = `

  if(!bloccaEsercizio) document.getElementById('fEsercizio').addEventListener('change', renderCampiCondizionati);

    const erroreBox = document.getElementById('erroreForm');
    erroreBox.style.display='none';
    const esercizioId = bloccaEsercizio ? voceEsistente.esercizio_id : document.getElementById('fEsercizio').value;

    const nota = document.getElementById('fNota').value.trim() || null;
    if(!data){ erroreBox.textContent='Inserisci una data.'; erroreBox.style.display='block'; return false; }
    const payload = { esercizio_id: esercizioId, data, nota, origine: voceEsistente?.origine || 'manuale' };
    if(es?.tipo==='carico'){
      payload.peso = parseFloat(document.getElementById('fPeso').value) || null;
      payload.serie = parseInt(document.getElementById('fSerie').value) || null;
      payload.ripetizioni = parseInt(document.getElementById('fRipetizioni').value) || null;
      payload.fatto = true;
      if(payload.peso==null || payload.serie==null || payload.ripetizioni==null){
        erroreBox.textContent='Compila peso, serie e ripetizioni.'; erroreBox.style.display='block'; return false;
      }
    } else if(es?.traccia_rpe){
      const rpeVal = document.getElementById('fRpe').value;
      if(!rpeVal){
        erroreBox.textContent='Seleziona un punteggio RPE da 1 a 10.'; erroreBox.style.display='block'; return false;
      }
      payload.rpe = parseFloat(rpeVal);
      payload.fatto = true;
      if(es.nome === 'Arrampicata'){

        if(!bottoneAttivo){
          erroreBox.textContent='Seleziona la specialità (corda, 4x4 o boulder).'; erroreBox.style.display='block'; return false;
        }
        payload.specialita = bottoneAttivo.dataset.specialita;
      }
    } else {
      payload.fatto = document.getElementById('fFatto').checked;
    }
    try{
      if(voceEsistente){
        await conRetry(()=> sb.from('log_sessioni').update(payload).eq('id', voceEsistente.id));
      } else {
        await conRetry(()=> sb.from('log_sessioni').insert(payload));
      }
      return true;
    }catch(e){
      erroreBox.textContent = 'Errore di salvataggio: '+ (e.message||e); erroreBox.style.display='block';
      return false;
    }
  }

  document.getElementById('fSalva').onclick = async ()=>{
    if(await eseguiSalvataggio()){
      chiudiModale();
      renderDiario();
    }
  };

  const btnSalvaAltro = document.getElementById('fSalvaAltro');
  if(btnSalvaAltro){
    btnSalvaAltro.onclick = async ()=>{
      const dataMantenuta = document.getElementById('fData').value;
      if(await eseguiSalvataggio()){
        await renderDiario(); // aggiorna la lista sotto, senza chiudere il modale

        document.getElementById('fEsercizio').value = eserciziAttivi[0]?.id || '';
        document.getElementById('fData').value = dataMantenuta;
        document.getElementById('fNota').value = '';
        renderCampiCondizionati();
        document.getElementById('erroreForm').style.display='none';
      }
    };
  }
}

async function eliminaLog(voce){
  const procedi = async ()=>{
    try{
      await conRetry(()=> sb.from('log_sessioni').update({eliminato:true}).eq('id', voce.id));
      if(voce.origine==='da_scheda' && voce.prescrizione_id){
        await conRetry(()=> sb.from('prescrizioni').update({fatta:false, log_id:null}).eq('id', voce.prescrizione_id));
      }
      renderDiario();
    }catch(e){ alert('Errore eliminazione: '+(e.message||e)); }
  };
  if(voce.origine==='da_scheda'){
    confermaGenerica('Questo log è collegato a una prescrizione della Scheda. Eliminarlo la farà tornare "da fare".', 'Elimina', procedi);
  } else {
    confermaGenerica('Eliminare questa sessione dal Diario?', 'Elimina', procedi);
  }
}

/* ============================================================
   VISTA 2 — GRIGLIA DI ADERENZA
   ============================================================ */
function interpolaColore(c1, c2, t){
  t = Math.max(0, Math.min(1,t));
  const r = Math.round(c1[0] + (c2[0]-c1[0])*t);
  const g = Math.round(c1[1] + (c2[1]-c1[1])*t);
  const b = Math.round(c1[2] + (c2[2]-c1[2])*t);
  return `rgb(${r},${g},${b})`;
}
function coloreAderenza(giorniDaUltimoLog, target){
  if(giorniDaUltimoLog === null) return `rgb(${COLORE_ROCCIA.join(',')})`;
  const ratio = giorniDaUltimoLog / target;
  if(ratio <= 1){
    if(ratio <= 0.5) return interpolaColore(COLORE_MUSCHIO, COLORE_OCRA, ratio/0.5);
    return interpolaColore(COLORE_OCRA, COLORE_ARANCIO, (ratio-0.5)/0.5);
  }
  const ratio2 = Math.min((ratio-1)/(SOGLIA_ROSSO_PIENO-1), 1);
  return interpolaColore(COLORE_ARANCIO, COLORE_ROSSO, ratio2);
}

async function renderGriglia(){
  const cont = document.getElementById('contenutoGriglia');
  cont.innerHTML = '<div class="vuoto">Caricamento…</div>';
  await caricaEsercizi();
  const attivi = stato.esercizi.filter(e=>!e.archiviato);
  if(attivi.length===0){ cont.innerHTML = '<div class="vuoto">Nessun esercizio attivo in libreria.</div>'; return; }

  const oggi = oggiISO();
  const rAll = await conRetry(()=> sb.from('log_sessioni').select('esercizio_id, data').eq('eliminato', false));
  const logTutti = rAll.data || [];

  // Per ogni esercizio calcoliamo l'aderenza (gestendo il pooling per categoria, se attivo).
  const righe = attivi.map(es=>{
    const cat = categoriaPerId(es.categoria_id);
    const poolCondiviso = !!(cat && cat.target_giorni != null);
    // Se la categoria ha un countdown condiviso, il "gruppo" di riferimento è tutti gli esercizi
    // attivi di quella categoria; altrimenti il gruppo è solo l'esercizio stesso (comportamento invariato).
    const idsGruppo = poolCondiviso
      ? attivi.filter(e=>e.categoria_id === es.categoria_id).map(e=>e.id)
      : [es.id];
    let ultimaData = null;
    for(const l of logTutti) if(idsGruppo.includes(l.esercizio_id) && (!ultimaData || l.data>ultimaData)) ultimaData = l.data;
    const giorni = ultimaData ? differenzaGiorni(ultimaData, oggi) : null;
    const target = poolCondiviso ? cat.target_giorni : es.target_giorni;
    const ratio = giorni===null ? null : giorni/target;
    return { es, cat, poolCondiviso, giorni, target, ratio };
  });

  // Lista unica ordinata dal più urgente (ratio alto → rosso) al più recente (ratio basso → verde).
  // "Mai fatto" sempre in fondo, indipendentemente dal colore blu-roccia che avrebbe.
  righe.sort((a,b)=>{
    if(a.giorni===null && b.giorni===null) return a.es.nome.localeCompare(b.es.nome);
    if(a.giorni===null) return 1;
    if(b.giorni===null) return -1;
    if(b.ratio !== a.ratio) return b.ratio - a.ratio;
    return a.es.nome.localeCompare(b.es.nome);
  });

  let html = '<table class="tabella-griglia"><thead><tr><th style="text-align:left">Esercizio</th><th>Stato</th></tr></thead><tbody>';
  for(const { es, cat, poolCondiviso, giorni, target } of righe){
    const colore = coloreAderenza(giorni, target);
    const etichettaStato = giorni===null ? 'mai fatto' : (giorni===0 ? 'oggi' : `${giorni}g fa`);
    const titoloStato = poolCondiviso ? `Countdown condiviso con gli altri esercizi di "${cat.nome}"` : '';
    html += `<tr>
      <td class="nome-esercizio">${cat ? `<span class="pallino-categoria" style="background:${cat.colore}"></span> ` : ''}${es.nome}</td>
      <td><span class="stato-cella" style="background:${colore}" ${titoloStato ? `title="${titoloStato}"` : ''}>${etichettaStato}${poolCondiviso ? ' &#8226;&#8226;&#8226;' : ''}</span></td>
    </tr>`;
  }
  html += '</tbody></table>';
  cont.innerHTML = html;
}

/* ------------------------------------------------------------
   Tooltip al TAP (sostituisce l'hover-only <title> SVG, che su
   mobile non risponde al tocco). Qualunque elemento SVG con
   data-tip="testo" diventa tappabile; un solo tooltip alla volta,
   si chiude toccando un altro elemento o fuori dal grafico.
   ------------------------------------------------------------ */
let elementoTooltipGrafico = null;
function nascondiTooltipGrafico(){
  if(elementoTooltipGrafico){ elementoTooltipGrafico.remove(); elementoTooltipGrafico = null; }
}
function mostraTooltipGrafico(target, testo, containerEl){
  nascondiTooltipGrafico();
  const box = document.createElement('div');
  box.className = 'tooltip-grafico';
  box.textContent = testo;
  containerEl.appendChild(box);
  const rBar = target.getBoundingClientRect();
  const rCont = containerEl.getBoundingClientRect();
  box.style.left = (rBar.left - rCont.left + rBar.width/2) + 'px';
  box.style.top = (rBar.top - rCont.top) + 'px';
  elementoTooltipGrafico = box;
}
function attivaTooltipGrafico(containerEl){
  if(!containerEl) return;
  containerEl.querySelectorAll('[data-tip]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      mostraTooltipGrafico(el, el.dataset.tip, containerEl);
    });
  });
}
document.addEventListener('click', (e)=>{ if(!e.target.closest('.grafico-svg-cont')) nascondiTooltipGrafico(); });

function formatNumero(v){
  if(v == null) return '';
  return Number.isInteger(v) ? String(v) : v.toFixed(1);
}

/* ============================================================
   GRAFICO "MESE" (una barra per ogni sessione loggata nel mese
   selezionato, posizionata lungo l'asse X in base al giorno reale
   del mese — non più a distanza fissa. Così un buco di riposo tra
   due sessioni si vede come spazio vuoto proporzionale, e sessioni
   ravvicinate restano visivamente vicine.

   Due varianti, a seconda del flag esercizi.sottrai_peso_corporeo:
   - true (oggi solo Trazioni): il campo peso registrato è la ZAVORRA.
     Si ricostruisce il totale (zavorra + peso corporeo alla data) e si
     mostra Intensità (%RM, asse da 60%=corpo libero) + Volume, entrambi
     calcolati sul totale. Le sessioni precedenti alla storicizzazione
     di Tmax/peso corporeo sono marcate come stima (tratteggio).
   - false (tutti gli altri esercizi a carico): il campo peso è il totale
     come sempre. Si mostra Carico (peso puro) con asse min/max calcolato
     automaticamente dal range storico del mese, + Volume.
   ============================================================ */
function giorniNelMese(chiaveMese){
  const [y,m] = chiaveMese.split('-').map(Number);
  return new Date(Date.UTC(y, m, 0)).getUTCDate();
}
function giornoDelMese(iso){
  return parseInt(iso.slice(8,10), 10);
}

function svgBarreMese(punti, opts){
  const giorniMese = opts.giorniMese;
  const largSim = opts.simulato ? 24 : 0; // spazio extra a destra per la barra simulata, subito dopo l'ultima reale
  const larghezza = 340, altezza = 150;
  const paddingLeft=42, paddingRight=10+largSim, paddingBottom=28, paddingTop=12;
  const areaGrafico = altezza-paddingTop-paddingBottom;
  const larghezzaDisponibile = larghezza-paddingLeft-paddingRight;
  const xPerGiorno = g => giorniMese>1 ? paddingLeft + ((g-1)/(giorniMese-1))*larghezzaDisponibile : paddingLeft + larghezzaDisponibile/2;
  const larghezzaBarra = 9;
  const min = opts.min, max = opts.max>opts.min ? opts.max : opts.min+1;
  const scalaY = v => altezza-paddingBottom - ((v-min)/(max-min))*areaGrafico;

  let assiY = '';
  opts.righeGuida.forEach(v=>{
    const y = scalaY(v);
    assiY += `<line x1="${paddingLeft}" y1="${y}" x2="${larghezza-paddingRight}" y2="${y}" stroke="var(--magnesite, #F2EFE9)" stroke-width="0.5" stroke-opacity="0.2" />`;
    assiY += `<text x="${paddingLeft-6}" y="${y+3}" text-anchor="end" class="etichetta-parziale">${opts.formattaEtichettaY ? opts.formattaEtichettaY(v) : formatNumero(Math.round(v))}</text>`;
  });

  // Etichette asse X: al massimo 6, equidistanti tra i punti presenti (non tra i giorni
  // del mese), sempre prima e ultima incluse.
  const targetEtichette = Math.min(punti.length, 6);
  const indiciEtichette = new Set();
  if(punti.length){
    if(targetEtichette<=1) indiciEtichette.add(0);
    else for(let j=0;j<targetEtichette;j++) indiciEtichette.add(Math.round(j*(punti.length-1)/(targetEtichette-1)));
  }

  let barre = '';
  punti.forEach((p,i)=>{
    const valoreClamped = Math.max(p.valore, min);
    const h = Math.max(2, scalaY(min) - scalaY(valoreClamped));
    const x = xPerGiorno(p.giorno) - larghezzaBarra/2;
    const y = scalaY(valoreClamped);
    const colore = p.colore || 'var(--arancio, #E8622C)';
    const testoTip = `${p.etichetta}${p.gruppoEtichetta?' · '+p.gruppoEtichetta:''}: ${formatNumero(p.valore)}${opts.unita?' '+opts.unita:''}${p.stima?' (stima)':''}`;
    barre += `<rect x="${x}" y="${y}" width="${larghezzaBarra}" height="${h}" rx="2.5"
      fill="${p.stima ? 'transparent' : colore}"
      stroke="${colore}" stroke-width="${p.stima?1.3:0}" stroke-dasharray="${p.stima?'3,3':'0'}"
      data-tip="${escapeHtml(testoTip)}"></rect>`;
    if(indiciEtichette.has(i)){
      barre += `<text x="${xPerGiorno(p.giorno)}" y="${altezza-6}" text-anchor="middle" class="etichetta-parziale">${p.etichetta}</text>`;
    }
  });

  if(opts.simulato){
    const s = opts.simulato;
    const valoreClamped = Math.max(s.valore, min);
    const h = Math.max(2, scalaY(min) - scalaY(valoreClamped));
    const ultimoGiorno = punti.length ? punti[punti.length-1].giorno : giorniMese/2;
    const xBarra = xPerGiorno(ultimoGiorno) + larghezzaBarra + 8; // poco spazio, solo per non sovrapporle
    const y = scalaY(valoreClamped);
    const testoTip = `Simulazione: ${formatNumero(s.valore)}${opts.unita?' '+opts.unita:''}`;
    barre += `<rect x="${xBarra-larghezzaBarra/2}" y="${y}" width="${larghezzaBarra}" height="${h}" rx="2.5"
      fill="#8A6FA3"
      data-tip="${escapeHtml(testoTip)}"></rect>`;
  }

  return `<svg class="grafico-svg" viewBox="0 0 ${larghezza} ${altezza}">${assiY}${barre}</svg>`;
}

async function renderGraficoCaricoMese(esercizioId, es, chiaveMese){
  const cont = document.getElementById('contenutoGrafici');
  cont.innerHTML = '<div class="vuoto">Caricamento…</div>';
  const r = await conRetry(()=> sb.from('log_sessioni').select('data, peso, serie, ripetizioni').eq('eliminato', false).eq('esercizio_id', esercizioId).order('data'));
  const log = (r.data || []).filter(l=>l.peso!=null);
  aggiornaLimitePrecedente(log, chiaveMese);

  const { inizio, fine } = confiniPeriodo('mese', chiaveMese);
  const logMese = log.filter(l => l.data>=inizio && l.data<=fine);
  const giorniMese = giorniNelMese(chiaveMese);

  if(logMese.length===0){
    cont.innerHTML = '<div class="vuoto">Nessuna sessione registrata in questo mese.</div>';
    return;
  }

  if(es?.sottrai_peso_corporeo){
    const storico = await caricaConfigStorico();
    const cfg = await caricaConfig();
    let cisonoStime = false;
    const puntiRm = [], puntiVol = [];
    for(const l of logMese){
      const tmaxInfo = valoreStoricoADATA(storico, 'tmax', l.data, cfg.tmax);
      const pesoInfo = valoreStoricoADATA(storico, 'peso', l.data, cfg.peso);
      const stima = tmaxInfo.stima || pesoInfo.stima;
      if(stima) cisonoStime = true;
      const totale = (pesoInfo.valore ?? 0) + l.peso;
      const etichetta = formattaBreve(l.data);
      const giorno = giornoDelMese(l.data);
      if(tmaxInfo.valore!=null && tmaxInfo.valore>0){
        puntiRm.push({ etichetta, giorno, valore: (totale/tmaxInfo.valore)*100, stima });
      }
      puntiVol.push({ etichetta, giorno, valore: totale*(l.serie||0)*(l.ripetizioni||0), stima });
    }

    // Simulatore "barra fantasma" (solo Trazioni): serie × ripetizioni × intensità (%RM) inseriti
    // a mano da Gabriele, mai salvati su DB. Usa il Tmax attuale (di oggi), non lo storico.
    const eSimulabile = es.nome === 'Trazioni';
    const sim = eSimulabile ? stato.simTrazioni : null;
    let simRm = null, simVol = null;
    if(sim && cfg.tmax){
      const totaleSim = cfg.tmax * (sim.intensita/100);
      simRm = { valore: sim.intensita };
      simVol = { valore: totaleSim * sim.serie * sim.ripetizioni };
    }

    const maxRmDati = Math.max(puntiRm.length ? Math.max(...puntiRm.map(p=>p.valore)) : 100, simRm?.valore ?? 0);
    const tettoRm = Math.max(100, Math.ceil(maxRmDati/10)*10);
    const righeGuidaRm = [];
    for(let v=60; v<=tettoRm; v+=10) righeGuidaRm.push(v);
    const maxVol = Math.max(1, ...puntiVol.map(p=>p.valore), simVol?.valore ?? 0);

    cont.innerHTML = `
      <h3 style="font-size:14px; color:var(--magnesite-attenuata); margin:6px 0;">Intensità (%RM), per sessione</h3>
      <div id="graficoRmSessione" class="grafico-svg-cont"></div>
      <h3 style="font-size:14px; color:var(--magnesite-attenuata); margin:14px 0 6px;">Volume totale, per sessione</h3>
      <div id="graficoVolSessione" class="grafico-svg-cont"></div>
      <div style="font-size:11px; color:var(--magnesite-attenuata); margin-top:6px;">${cisonoStime ? 'Tratteggio = stima (Tmax/peso corporeo di oggi, non ancora storicizzati a quella data). ' : ''}Tocca una barra per il valore esatto.</div>
      ${eSimulabile ? `
      <div style="margin-top:14px; padding:10px; border:1px solid var(--ardesia-bordo); border-radius:8px;">
        <h3 style="font-size:14px; color:var(--magnesite-attenuata); margin:0 0 8px;">Simula una sessione</h3>
        <div style="display:flex; flex-wrap:wrap; gap:8px;">
          <div class="riga-form" style="flex:0 0 62px; margin-bottom:0;"><label for="simSerie">Serie</label><input type="number" min="1" id="simSerie" style="width:100%; min-width:0; padding-left:6px; padding-right:6px;" value="${sim?.serie ?? ''}"></div>
          <div class="riga-form" style="flex:0 0 62px; margin-bottom:0;"><label for="simRip">Rip.</label><input type="number" min="1" id="simRip" style="width:100%; min-width:0; padding-left:6px; padding-right:6px;" value="${sim?.ripetizioni ?? ''}"></div>
          <div class="riga-form" style="flex:1 1 110px; min-width:110px; margin-bottom:0;"><label for="simInt">Intensità (%RM)</label><input type="number" min="1" step="1" id="simInt" value="${sim?.intensita ?? ''}"></div>
        </div>
        ${!cfg.tmax ? '<div style="font-size:11px; color:var(--magnesite-attenuata); margin-top:8px;">Imposta Tmax in Impostazioni per usare il simulatore.</div>' : ''}
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button class="btn primario" style="flex:1" id="btnSimula" ${!cfg.tmax?'disabled':''}>Simula</button>
          ${sim ? '<button class="btn secondario" id="btnSimulaCancella">Cancella</button>' : ''}
        </div>
      </div>` : ''}
    `;
    const elRm = document.getElementById('graficoRmSessione');
    elRm.innerHTML = (puntiRm.length || simRm)
      ? svgBarreMese(puntiRm, { min:60, max:tettoRm, unita:'%', righeGuida: righeGuidaRm, formattaEtichettaY:v=>v+'%', giorniMese, simulato: simRm })
      : '<div class="vuoto">Tmax non impostato: imposta Tmax in Impostazioni per vedere il %RM.</div>';
    attivaTooltipGrafico(elRm);
    const elVol = document.getElementById('graficoVolSessione');
    elVol.innerHTML = svgBarreMese(puntiVol, { min:0, max:maxVol, unita:'kg', righeGuida:[0, maxVol/2, maxVol], giorniMese, simulato: simVol });
    attivaTooltipGrafico(elVol);

    if(eSimulabile){
      document.getElementById('btnSimula').addEventListener('click', ()=>{
        const serie = parseInt(document.getElementById('simSerie').value) || 0;
        const ripetizioni = parseInt(document.getElementById('simRip').value) || 0;
        const intensita = parseFloat(document.getElementById('simInt').value) || 0;
        if(!cfg.tmax || serie<=0 || ripetizioni<=0 || intensita<=0) return;
        stato.simTrazioni = { serie, ripetizioni, intensita };
        renderGraficoSelezionato();
      });
      const btnCancella = document.getElementById('btnSimulaCancella');
      if(btnCancella) btnCancella.addEventListener('click', ()=>{
        stato.simTrazioni = null;
        renderGraficoSelezionato();
      });
    }
  } else {
    // Esercizi a carico "normali": peso puro, asse min/max calcolato dal range del mese
    // (niente numeri a mano: se un giorno sfondi un record, l'asse si allarga da solo).
    const pesi = logMese.map(l=>l.peso);
    const minPeso = Math.min(...pesi), maxPeso = Math.max(...pesi);
    let baseAsse, tettoAsse;
    if(minPeso === maxPeso){
      baseAsse = Math.max(0, minPeso*0.8);
      tettoAsse = maxPeso*1.2 || 1;
    } else {
      const margine = (maxPeso-minPeso)*0.15;
      baseAsse = Math.max(0, minPeso-margine);
      tettoAsse = maxPeso+margine;
    }
    const puntiPeso = logMese.map(l=>({ etichetta:formattaBreve(l.data), giorno:giornoDelMese(l.data), valore:l.peso, stima:false }));
    const puntiVol = logMese.map(l=>({ etichetta:formattaBreve(l.data), giorno:giornoDelMese(l.data), valore:l.peso*(l.serie||0)*(l.ripetizioni||0), stima:false }));
    const maxVol = Math.max(1, ...puntiVol.map(p=>p.valore));

    cont.innerHTML = `
      <h3 style="font-size:14px; color:var(--magnesite-attenuata); margin:6px 0;">Carico, per sessione</h3>
      <div id="graficoPesoSessione" class="grafico-svg-cont"></div>
      <h3 style="font-size:14px; color:var(--magnesite-attenuata); margin:14px 0 6px;">Volume totale, per sessione</h3>
      <div id="graficoVolSessione" class="grafico-svg-cont"></div>
      <div style="font-size:11px; color:var(--magnesite-attenuata); margin-top:6px;">Tocca una barra per il valore esatto.</div>
    `;
    const elPeso = document.getElementById('graficoPesoSessione');
    elPeso.innerHTML = svgBarreMese(puntiPeso, { min:baseAsse, max:tettoAsse, unita:'kg', righeGuida:[baseAsse, (baseAsse+tettoAsse)/2, tettoAsse], giorniMese });
    attivaTooltipGrafico(elPeso);
    const elVol = document.getElementById('graficoVolSessione');
    elVol.innerHTML = svgBarreMese(puntiVol, { min:0, max:maxVol, unita:'kg', righeGuida:[0, maxVol/2, maxVol], giorniMese });
    attivaTooltipGrafico(elVol);
  }
}

/* Vista "Mese" del grafico RPE (Arrampicata): una barra per sessione, colorata
   secondo la specialità (corda/4x4/boulder), filtrata sul mese selezionato e
   posizionata per giorno reale come il grafico a carico. */
async function renderGraficoRpeMese(esercizioId, es, chiaveMese){
  const cont = document.getElementById('contenutoGrafici');
  cont.innerHTML = '<div class="vuoto">Caricamento…</div>';
  const r = await conRetry(()=> sb.from('log_sessioni').select('data, rpe, specialita').eq('eliminato', false).eq('esercizio_id', esercizioId).order('data'));
  const log = (r.data || []).filter(l=>l.rpe!=null);
  aggiornaLimitePrecedente(log, chiaveMese);

  const { inizio, fine } = confiniPeriodo('mese', chiaveMese);
  const logMese = log.filter(l => l.data>=inizio && l.data<=fine);
  if(logMese.length===0){ cont.innerHTML = '<div class="vuoto">Nessuna sessione registrata in questo mese.</div>'; return; }

  const giorniMese = giorniNelMese(chiaveMese);
  const conSpecialita = es.nome === 'Arrampicata';
  const punti = logMese.map(l=>{
    const spec = conSpecialita ? SPECIALITA_ARRAMPICATA.find(s=>s.valore===l.specialita) : null;
    return { etichetta: formattaBreve(l.data), giorno: giornoDelMese(l.data), valore: l.rpe, colore: spec?.colore, gruppoEtichetta: spec?.etichetta, stima:false };
  });

  cont.innerHTML = `
    <h3 style="font-size:14px; color:var(--magnesite-attenuata); margin:6px 0;">Impegno percepito (RPE), per sessione</h3>
    ${conSpecialita ? `<div style="display:flex; gap:12px; margin-bottom:8px; flex-wrap:wrap;">
      ${SPECIALITA_ARRAMPICATA.map(s=>`<div style="display:flex; align-items:center; gap:5px; font-size:12px; color:var(--magnesite-attenuata);"><span style="width:10px; height:10px; border-radius:3px; background:${s.colore}; display:inline-block;"></span>${s.etichetta}</div>`).join('')}
    </div>` : ''}
    <div id="graficoRpeSessione" class="grafico-svg-cont"></div>
    <div style="font-size:11px; color:var(--magnesite-attenuata); margin-top:6px;">Tocca una barra per il valore esatto.</div>
  `;
  const elRpe = document.getElementById('graficoRpeSessione');
  elRpe.innerHTML = svgBarreMese(punti, { min:1, max:10, unita:'', righeGuida:[1, 5.5, 10], giorniMese });
  attivaTooltipGrafico(elRpe);
}

/* ============================================================
   VISTA 4 — MACROCICLO (agenda Trazioni a pillole + calcolatore zavorra)
   Sostituisce il vecchio sistema a macrocicli/settimane/sedute (tabelle
   lasciate intatte ma non più referenziate). Due parti indipendenti:
   1) Calcolatore zavorra: 70→95% calcolati al volo da tmax/peso corporeo
      (config), nessun dato proprio, nessuna migration.
   2) Agenda: una riga per settimana (lunedì di riferimento), due "pillole"
      fisse per settimana (slot A/B). Nessuna data del giorno esatto:
      solo nota libera + stato fatto/pianificato/vuoto. Segnare una pillola
      come "fatta" crea (una sola volta) una riga nel Diario collegata
      tramite log_id; l'eventuale sessione nel Diario non viene mai toccata
      da modifiche/eliminazioni successive dell'agenda.
   ============================================================ */
async function renderScheda(){
  await caricaEsercizi();
  const esTrazioni = stato.esercizi.find(e=>e.nome==='Trazioni' && !e.archiviato);
  const contCalcolatore = document.getElementById('selettoreMacrociclo');
  const contAgenda = document.getElementById('contenutoMacrociclo');
  if(!esTrazioni){
    contCalcolatore.innerHTML = '';
    contAgenda.innerHTML = '<div class="vuoto">Esercizio "Trazioni" non trovato (o archiviato) in Libreria.</div>';
    return;
  }
  const config = await caricaConfig();
  renderCalcolatoreZavorra(contCalcolatore, esTrazioni, config);
  await renderAgendaTrazioni(contAgenda, esTrazioni);
}

/* ---- Calcolatore zavorra: 70→95%, step 5, sola lettura ---- */
function renderCalcolatoreZavorra(cont, esTrazioni, config){
  const percentuali = [70,75,80,85,90,95];
  const usaZavorra = !!esTrazioni.sottrai_peso_corporeo;
  const base = usaZavorra
    ? `1RM ${config.tmax ?? '—'} kg · corporeo ${config.peso ?? '—'} kg`
    : `1RM ${config.tmax ?? '—'} kg`;
  const celle = percentuali.map(p=>{
    let testo = '—';
    if(config.tmax != null){
      const kgTotali = config.tmax * p / 100;
      const valore = (usaZavorra && config.peso != null) ? (kgTotali - config.peso) : kgTotali;
      const arrotondato = Math.round(valore*10)/10;
      testo = (usaZavorra && arrotondato>0 ? '+' : '') + arrotondato;
    }
    return `<div class="cz-cella"><div class="cz-perc">${p}%</div><div class="cz-val">${testo}<span class="cz-unita">kg</span></div></div>`;
  }).join('');
  const chiuso = stato.calcolatoreZavorraAperto ? '' : 'chiuso';
  cont.innerHTML = `
    <div class="calcolatore-zavorra ${chiuso}" id="calcolatoreZavorra">
      <div class="cz-header" id="czHeader">
        <div>
          <div class="cz-titolo">Calcolatore zavorra</div>
          <div class="cz-base">${base}</div>
        </div>
        <span class="cz-chevron">&#9650;</span>
      </div>
      <div class="cz-body">${celle}</div>
    </div>
  `;
  document.getElementById('czHeader').onclick = ()=>{
    const el = document.getElementById('calcolatoreZavorra');
    el.classList.toggle('chiuso');
    stato.calcolatoreZavorraAperto = !el.classList.contains('chiuso');
  };
}

/* ---- Agenda: elenco di lunedì (1 futuro, oggi, N passati) ---- */
function elencoSettimaneAgenda(numeroPassate){
  const lunediOggi = lunediSettimana(oggiISO());
  const lista = [aggiungiGiorni(lunediOggi, 7), lunediOggi];
  for(let i=1; i<=numeroPassate; i++) lista.push(aggiungiGiorni(lunediOggi, -7*i));
  return lista;
}

function pillolaAgendaHtml(settimanaInizio, slot, riga){
  if(!riga){
    return `<button class="pillola-agenda vuota" data-settimana="${settimanaInizio}" data-slot="${slot}">+ ${slot}</button>`;
  }
  const classe = riga.fatto ? 'fatta' : 'pianificata';
  const spunta = riga.fatto ? '&#10003; ' : '';
  const testo = riga.nota ? escapeHtml(riga.nota) : `Allenamento ${slot}`;
  return `<button class="pillola-agenda ${classe}" data-settimana="${settimanaInizio}" data-slot="${slot}">${spunta}${testo}</button>`;
}

async function renderAgendaTrazioni(cont, esTrazioni){
  cont.innerHTML = '<div class="vuoto">Caricamento…</div>';
  const settimane = elencoSettimaneAgenda(stato.numeroSettimanePassateCaricate);
  const piuVecchia = settimane[settimane.length-1];
  const r = await conRetry(()=> sb.from('macrociclo_agenda').select('*').gte('settimana_inizio', piuVecchia));
  const righe = r.data || [];
  const lunediOggi = lunediSettimana(oggiISO());

  const html = settimane.map(settimanaInizio=>{
    const fine = aggiungiGiorni(settimanaInizio, 6);
    const corrente = settimanaInizio === lunediOggi;
    const rigaA = righe.find(x=>x.settimana_inizio===settimanaInizio && x.slot==='A');
    const rigaB = righe.find(x=>x.settimana_inizio===settimanaInizio && x.slot==='B');
    return `
      <div class="riga-settimana-agenda ${corrente?'corrente':''}">
        <div class="rsa-data">${formattaBreve(settimanaInizio)}–${formattaBreve(fine)}</div>
        <div class="rsa-pillole">
          ${pillolaAgendaHtml(settimanaInizio,'A',rigaA)}
          ${pillolaAgendaHtml(settimanaInizio,'B',rigaB)}
        </div>
      </div>`;
  }).join('');

  cont.innerHTML = `
    <div class="agenda-trazioni">${html}</div>
    <button class="btn secondario blocco" id="btnCaricaAltreSettimane" style="margin-top:10px;">Carica altre settimane</button>
  `;

  cont.querySelectorAll('.pillola-agenda').forEach(p=>{
    p.addEventListener('click', ()=>{
      const settimanaInizio = p.dataset.settimana;
      const slot = p.dataset.slot;
      const riga = righe.find(x=>x.settimana_inizio===settimanaInizio && x.slot===slot);
      apriFormPillolaAgenda(esTrazioni, settimanaInizio, slot, riga);
    });
  });
  document.getElementById('btnCaricaAltreSettimane').onclick = ()=>{
    stato.numeroSettimanePassateCaricate += 8;
    renderAgendaTrazioni(cont, esTrazioni);
  };
}

/* ---- Form di una singola pillola: nota libera + eventuale log nel Diario ---- */
function apriFormPillolaAgenda(esTrazioni, settimanaInizio, slot, riga){
  const fine = aggiungiGiorni(settimanaInizio, 6);
  apriModale(`
    <h2>Allenamento ${slot} — ${formattaBreve(settimanaInizio)}–${formattaBreve(fine)}</h2>
    <div class="riga-form">
      <label for="paNota">Nota</label>
      <input type="text" id="paNota" placeholder="Es. 4×5 @ +18kg" value="${riga?.nota ? escapeHtml(riga.nota) : ''}">
    </div>
    <label style="display:flex; align-items:center; gap:6px; font-size:14px; margin-bottom:12px;">
      <input type="checkbox" id="paFatto" ${riga?.fatto ? 'checked' : ''}> Segna come fatta
    </label>
    <div id="blocRegistraLog">
      <div class="riga-form"><label for="paPeso">Zavorra (kg)</label><input type="number" step="0.5" id="paPeso"></div>
      <div class="riga-form"><label for="paSerie">Serie</label><input type="number" id="paSerie"></div>
      <div class="riga-form"><label for="paRipetizioni">Ripetizioni</label><input type="number" id="paRipetizioni"></div>
    </div>
    <div class="errore-box" id="paErrore" style="display:none;"></div>
    <div style="display:flex; gap:8px;">
      ${riga ? '<button class="btn pericolo" style="flex:1" id="paElimina">Svuota</button>' : '<button class="btn secondario" style="flex:1" id="paAnnulla">Annulla</button>'}
      <button class="btn primario" style="flex:1" id="paSalva">Salva</button>
    </div>
  `);

  const chkFatto = document.getElementById('paFatto');
  const blocLog = document.getElementById('blocRegistraLog');
  const aggiornaBloccoLog = ()=>{
    blocLog.style.display = (chkFatto.checked && !riga?.log_id) ? 'block' : 'none';
  };
  aggiornaBloccoLog();
  chkFatto.addEventListener('change', aggiornaBloccoLog);

  if(riga){
    document.getElementById('paElimina').onclick = ()=>{
      confermaGenerica('Svuotare questo allenamento? Se era collegata una sessione nel Diario, resta intatta lì.', 'Svuota', async ()=>{
        await conRetry(()=> sb.from('macrociclo_agenda').delete().eq('id', riga.id));
        chiudiModale();
        renderScheda();
      });
    };
  } else {
    document.getElementById('paAnnulla').onclick = chiudiModale;
  }

  document.getElementById('paSalva').onclick = async ()=>{
    const erroreBox = document.getElementById('paErrore');
    const nota = document.getElementById('paNota').value.trim() || null;
    const fatto = chkFatto.checked;
    try{
      let logId = null;
      if(fatto){
        logId = riga?.log_id || null;
        if(!logId){
          const payload = {
            esercizio_id: esTrazioni.id,
            data: oggiISO(),
            origine: 'da_scheda',
            nota,
            peso: parseFloat(document.getElementById('paPeso').value) || null,
            serie: parseInt(document.getElementById('paSerie').value) || null,
            ripetizioni: parseInt(document.getElementById('paRipetizioni').value) || null,
            fatto: true,
          };
          const ins = await conRetry(()=> sb.from('log_sessioni').insert(payload).select().single());
          logId = ins.data.id;
        }
      }
      await conRetry(()=> sb.from('macrociclo_agenda').upsert(
        { settimana_inizio: settimanaInizio, slot, nota, fatto, log_id: logId },
        { onConflict: 'settimana_inizio,slot' }
      ));
      chiudiModale();
      renderScheda();
    }catch(e){ erroreBox.textContent = 'Errore: '+(e.message||e); erroreBox.style.display='block'; }
  };
}

async function renderLibreria(){
  await caricaEsercizi();
  const cont = document.getElementById('listaEsercizi');
  const lista = stato.esercizi.filter(e=> stato.filtroLibreria==='attivi' ? !e.archiviato : e.archiviato);
  if(lista.length===0){ cont.innerHTML = `<div class="vuoto">Nessun esercizio ${stato.filtroLibreria}.</div>`; return; }

  // Raggruppamento per categoria (le senza-categoria vanno in fondo)
  const gruppi = new Map();
  for(const e of lista){
    const cat = categoriaPerId(e.categoria_id);
    const chiave = cat ? cat.nome : '\uFFFFSenza categoria';
    if(!gruppi.has(chiave)) gruppi.set(chiave, { cat, esercizi: [] });
    gruppi.get(chiave).esercizi.push(e);
  }
  const chiaviOrdinate = [...gruppi.keys()].sort();

  cont.innerHTML = chiaviOrdinate.map(chiave=>{
    const { cat, esercizi } = gruppi.get(chiave);
    const nomeCat = cat ? cat.nome : 'Senza categoria';
    const colore = cat ? cat.colore : 'var(--magnesite-attenuata)';
    return `
      <div class="intestazione-categoria"><span class="pallino-categoria" style="background:${colore}"></span>${nomeCat}</div>
      ${esercizi.map(e=>`
      <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
        <div style="display:flex; align-items:center; gap:8px;">
          <span class="pallino-categoria" style="background:${colore}"></span>
          <div><strong>${e.nome}</strong><br><span style="font-size:12px; color:var(--magnesite-attenuata);">${e.tipo==='carico'?'A carico':'Binario'} — ogni ${(cat && cat.target_giorni!=null) ? cat.target_giorni : e.target_giorni} giorni${(cat && cat.target_giorni!=null) ? ' (condiviso con la categoria)' : ''}</span></div>
        </div>
        <div class="azioni">
          <button class="icona-btn" id="mod-es-${e.id}" aria-label="Modifica">&#9998;</button>
          <button class="icona-btn" id="arc-es-${e.id}" aria-label="${e.archiviato?'Riattiva':'Archivia'}">${e.archiviato?'&#8635;':'&#128230;'}</button>
          ${e.archiviato ? `<button class="icona-btn" id="rim-es-${e.id}" aria-label="Rimuovi per sempre">&#128465;</button>` : ''}
        </div>
      </div>`).join('')}
    `;
  }).join('');

  lista.forEach(e=>{
    document.getElementById('mod-es-'+e.id).addEventListener('click', ()=> apriFormEsercizio(e));
    document.getElementById('arc-es-'+e.id).addEventListener('click', ()=> e.archiviato ? riattivaEsercizio(e) : archiviaEsercizio(e));
    if(e.archiviato) document.getElementById('rim-es-'+e.id).addEventListener('click', ()=> rimuoviPerSempreEsercizio(e));
  });
}

async function apriFormEsercizio(esistente){
  let bloccaTipo = false, numeroLogCollegati = 0;
  if(esistente){
    const r = await conRetry(()=> sb.from('log_sessioni').select('id', {count:'exact', head:true}).eq('esercizio_id', esistente.id).eq('eliminato', false));
    numeroLogCollegati = r.count || 0;
    bloccaTipo = numeroLogCollegati > 0;
  }
  apriModale(`
    <h2>${esistente ? 'Modifica esercizio' : 'Nuovo esercizio'}</h2>
    ${bloccaTipo ? `<div class="avviso-box">Non modificabile: ci sono ${numeroLogCollegati} log collegati a questo esercizio. Per cambiare tipo, archivialo e creane uno nuovo.</div>` : ''}
    <div class="riga-form"><label for="eNome">Nome</label><input type="text" id="eNome" value="${esistente?escapeHtml(esistente.nome):''}"></div>
    <div class="riga-form">
      <label for="eTipo">Tipo</label>
      <select id="eTipo" ${bloccaTipo?'disabled':''}>
        <option value="binario" ${esistente?.tipo==='binario'?'selected':''}>Binario (fatto/non fatto)</option>
        <option value="carico" ${esistente?.tipo==='carico'?'selected':''}>A carico (peso/serie/ripetizioni)</option>
      </select>
    </div>
    <div class="riga-form"><label for="eTarget">Ogni quanti giorni (max 10)</label><input type="number" id="eTarget" min="1" max="10" value="${esistente?.target_giorni ?? 3}"></div>
    <div class="riga-form">
      <label for="eCategoria">Categoria</label>
      <select id="eCategoria">
        <option value="">Senza categoria</option>
        ${stato.categorie.map(c=>`<option value="${c.id}" ${esistente?.categoria_id===c.id?'selected':''}>${escapeHtml(c.nome)}</option>`).join('')}
        <option value="__nuova__">+ Nuova categoria…</option>
      </select>
    </div>
    <div id="areaNuovaCategoria" style="display:none;">
      <div class="riga-form"><label for="eNomeCategoria">Nome nuova categoria</label><input type="text" id="eNomeCategoria"></div>
      <div class="riga-form">
        <label>Colore</label>
        <div class="griglia-colori" id="grigliaColori">
          ${PALETTE_CATEGORIE.map((p,i)=>`<button type="button" class="swatch-colore ${i===0?'selezionato':''}" data-colore="${p.valore}" title="${p.nome}" style="background:${p.valore}"></button>`).join('')}
        </div>
      </div>
    </div>
    <div class="errore-box" id="eErrore" style="display:none;"></div>
    <div style="display:flex; gap:8px;">
      <button class="btn secondario" style="flex:1" id="eAnnulla">Annulla</button>
      <button class="btn primario" style="flex:1" id="eSalva">Salva</button>
    </div>
  `);
  let coloreScelto = PALETTE_CATEGORIE[0].valore;
  document.getElementById('eCategoria').addEventListener('change', (ev)=>{
    document.getElementById('areaNuovaCategoria').style.display = ev.target.value==='__nuova__' ? 'block' : 'none';
  });
  document.getElementById('grigliaColori').addEventListener('click', (ev)=>{
    const btn = ev.target.closest('.swatch-colore');
    if(!btn) return;
    document.querySelectorAll('.swatch-colore').forEach(b=>b.classList.remove('selezionato'));
    btn.classList.add('selezionato');
    coloreScelto = btn.dataset.colore;
  });
  document.getElementById('eAnnulla').onclick = chiudiModale;
  document.getElementById('eSalva').onclick = async ()=>{
    const erroreBox = document.getElementById('eErrore');
    const nome = document.getElementById('eNome').value.trim();
    const target = parseInt(document.getElementById('eTarget').value);
    if(!nome){ erroreBox.textContent='Inserisci un nome.'; erroreBox.style.display='block'; return; }
    if(!target || target<1 || target>10){ erroreBox.textContent='Il target giorni deve essere tra 1 e 10.'; erroreBox.style.display='block'; return; }
    let categoriaId = document.getElementById('eCategoria').value || null;
    if(categoriaId === '__nuova__'){
      const nomeCategoria = document.getElementById('eNomeCategoria').value.trim();
      if(!nomeCategoria){ erroreBox.textContent='Inserisci un nome per la nuova categoria.'; erroreBox.style.display='block'; return; }
      try{
        const insCat = await conRetry(()=> sb.from('categorie').insert({nome: nomeCategoria, colore: coloreScelto}).select().single());
        categoriaId = insCat.data.id;
        stato.categorie.push(insCat.data);
      }catch(e){ erroreBox.textContent='Errore creazione categoria: '+(e.message||e); erroreBox.style.display='block'; return; }
    }
    const payload = { nome, target_giorni: target, categoria_id: categoriaId };
    if(!bloccaTipo) payload.tipo = document.getElementById('eTipo').value;
    try{
      if(esistente) await conRetry(()=> sb.from('esercizi').update(payload).eq('id', esistente.id));
      else await conRetry(()=> sb.from('esercizi').insert({...payload, tipo: document.getElementById('eTipo').value}));
      chiudiModale();
      renderLibreria();
    }catch(e){ erroreBox.textContent='Errore: '+(e.message||e); erroreBox.style.display='block'; }
  };
}


async function archiviaEsercizio(es){
  const settimanaCorrenteMonday = lunediSettimana(oggiISO());
  const r = await conRetry(()=> sb.from('prescrizioni').select('id', {count:'exact', head:true}).eq('esercizio_id', es.id).eq('fatta', false).gte('settimana_inizio', settimanaCorrenteMonday));
  const nPendenti = r.count || 0;
  const procedi = async ()=>{
    await conRetry(()=> sb.from('esercizi').update({archiviato:true}).eq('id', es.id));
    renderLibreria();
  };
  if(nPendenti>0){
    confermaGenerica(`Hai ${nPendenti} prescrizioni pianificate non completate per questo esercizio. Vuoi archiviarlo comunque?`, 'Archivia comunque', procedi);
  } else {
    procedi();
  }
}
async function riattivaEsercizio(es){
  await conRetry(()=> sb.from('esercizi').update({archiviato:false}).eq('id', es.id));
  renderLibreria();
}

async function rimuoviPerSempreEsercizio(es){
  confermaGenerica(`Rimuovere per sempre "${es.nome}"? Se non ha storico collegato verrà eliminato definitivamente dal database; se invece ha log o prescrizioni collegate, lo storico resterà intatto nel Diario ma l'esercizio sparirà per sempre da Libreria, Griglia e Grafici (non reversibile da qui).`, 'Rimuovi per sempre', async ()=>{
    try{
      await conRetry(()=> sb.rpc('elimina_esercizio_se_senza_storico', {p_id: es.id}), 1);
      renderLibreria();
    }catch(e){
      // Ha storico collegato: il database ha correttamente rifiutato la cancellazione fisica.
      // Fallback automatico: lo nascondiamo per sempre mantenendo lo storico intatto.
      try{
        await conRetry(()=> sb.from('esercizi').update({eliminato:true}).eq('id', es.id));
        renderLibreria();
      }catch(e2){ alert('Errore: '+(e2.message||e2)); }
    }
  });
}

        <label>Colore</label>
        <div class="griglia-colori" id="catColori-${c.id}">
          ${PALETTE_CATEGORIE.map(p=>`<button type="button" class="swatch-colore ${p.valore.toLowerCase()===c.colore.toLowerCase()?'selezionato':''}" data-colore="${p.valore}" title="${p.nome}" style="background:${p.valore}"></button>`).join('')}
        </div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn secondario" style="flex:1" id="catSalva-${c.id}">Salva</button>
        <button class="btn pericolo" style="flex:1" id="catElimina-${c.id}">Elimina categoria</button>
      </div>
    </div>
  `).join('');
  stato.categorie.forEach(c=>{
    let coloreScelto = c.colore;
    document.getElementById('catColori-'+c.id).addEventListener('click', (ev)=>{
      const btn = ev.target.closest('.swatch-colore');
      if(!btn) return;
      document.querySelectorAll('#catColori-'+c.id+' .swatch-colore').forEach(b=>b.classList.remove('selezionato'));
      btn.classList.add('selezionato');
      coloreScelto = btn.dataset.colore;
    });
    document.getElementById('catSalva-'+c.id).addEventListener('click', async ()=>{
      const nuovoNome = document.getElementById('catNome-'+c.id).value.trim();
      if(!nuovoNome){ alert('Il nome non può essere vuoto.'); return; }
      try{
        await conRetry(()=> sb.from('categorie').update({nome:nuovoNome, colore:coloreScelto}).eq('id', c.id));
        apriGestioneCategorie();
      }catch(e){ alert('Errore: '+(e.message||e)); }
    });
    document.getElementById('catElimina-'+c.id).addEventListener('click', ()=>{
      confermaGenerica(`Eliminare la categoria "${c.nome}"? Gli esercizi che la usano torneranno "senza categoria" (non vengono toccati).`, 'Elimina categoria', async ()=>{
        try{
          await conRetry(()=> sb.from('categorie').delete().eq('id', c.id));
          apriGestioneCategorie();
        }catch(e){ alert('Errore: '+(e.message||e)); }
      });
    });
  });
}

/* ============================================================
   IMPOSTAZIONI (Tmax/Smax + backup)
   ============================================================ */
document.getElementById('btnImpostazioni').addEventListener('click', apriImpostazioni);
async function apriImpostazioni(){
  const r = await conRetry(()=> sb.from('config').select('*').eq('id',1).single());
  const config = r.data || {};
  apriModale(`
    <h2>Impostazioni</h2>
    <div class="card">
      <h3>Tmax / Smax</h3>
      <div class="riga-form"><label for="cTmax">Tmax (kg)</label><input type="number" step="0.1" id="cTmax" value="${config.tmax ?? ''}"></div>
      <div class="riga-form"><label for="cSmax">Smax (kg)</label><input type="number" step="0.1" id="cSmax" value="${config.smax ?? ''}"></div>
      <div class="riga-form"><label for="cPeso">Peso corporeo (kg)</label><input type="number" step="0.1" id="cPeso" value="${config.peso ?? ''}"></div>
      <button class="btn primario blocco" id="cSalva">Salva</button>
    </div>
    <div class="card">
      <h3>Backup</h3>
      <button class="btn secondario blocco" id="cScaricaJson" style="margin-bottom:8px;">Scarica backup (JSON)</button>
      <button class="btn secondario blocco" id="cScaricaTxt" style="margin-bottom:10px;">Scarica riepilogo leggibile (TXT)</button>
      <button class="btn secondario blocco" id="cMostraImporta">Importa da testo</button>
      <div id="areaImporta" style="display:none; margin-top:10px;">
        <textarea id="cTestoImporta" placeholder="Incolla qui il JSON esportato in precedenza" style="width:100%; min-height:100px;"></textarea>
        <button class="btn pericolo blocco" id="cConfermaImporta" style="margin-top:8px;">Sostituisci tutti i dati</button>
      </div>
    </div>
    <div class="errore-box" id="iErrore" style="display:none;"></div>
    <button class="btn secondario blocco" id="cChiudi">Chiudi</button>
  `);
  document.getElementById('cChiudi').onclick = chiudiModale;
  document.getElementById('cSalva').onclick = async ()=>{
    const tmax = parseFloat(document.getElementById('cTmax').value) || null;
    const smax = parseFloat(document.getElementById('cSmax').value) || null;
    const peso = parseFloat(document.getElementById('cPeso').value) || null;
    await conRetry(()=> sb.from('config').update({tmax, smax, peso}).eq('id',1));
    // Storicizza questi valori come validi da oggi in poi (per i grafici %RM di Trazioni).
    // Se si salva più volte lo stesso giorno, l'ultima sovrascrive semplicemente la voce di oggi.
    await conRetry(()=> sb.from('config_storico').upsert({data: oggiISO(), tmax, smax, peso}, {onConflict:'data'}));
    stato.config = null;
    stato.configStorico = null;
    chiudiModale();
  };
  document.getElementById('cScaricaJson').onclick = async ()=>{
    try{
      const [es, log, presc, cfg] = await Promise.all([
        conRetry(()=> sb.from('esercizi').select('*')),
        conRetry(()=> sb.from('log_sessioni').select('*')),
        conRetry(()=> sb.from('prescrizioni').select('*')),
        conRetry(()=> sb.from('config').select('*').eq('id',1).single()),
      ]);
      const backup = { esercizi: es.data, log_sessioni: log.data, prescrizioni: presc.data, config: cfg.data, esportato_il: new Date().toISOString() };
      await condividiOScarica(`diario_backup.json`, JSON.stringify(backup, null, 2), 'application/json');
    }catch(e){ alert('Errore export: '+(e.message||e)); }
  };
  document.getElementById('cScaricaTxt').onclick = async ()=>{
    try{
      const [es, log, cfg] = await Promise.all([
        conRetry(()=> sb.from('esercizi').select('*, categorie(nome)').order('nome')),
        conRetry(()=> sb.from('log_sessioni').select('*, esercizi(nome)').eq('eliminato', false).order('data', {ascending:false})),
        conRetry(()=> sb.from('config').select('*').eq('id',1).single()),
      ]);
      const righe = [];
      righe.push('DIARIO ALLENAMENTO — Riepilogo leggibile');
      righe.push(`Esportato il: ${new Date().toLocaleString('it-IT')}`);
      righe.push('');
      righe.push('--- IMPOSTAZIONI ---');
      righe.push(`Tmax: ${cfg.data?.tmax ?? '—'} kg`);
      righe.push(`Smax: ${cfg.data?.smax ?? '—'} kg`);
      righe.push(`Peso corporeo: ${cfg.data?.peso ?? '—'} kg`);
      righe.push('');
      righe.push('--- ESERCIZI ---');
      (es.data||[]).forEach(e=>{
        righe.push(`- ${e.nome} [${e.categorie?.nome || 'senza categoria'}]${e.archiviato ? ' (archiviato)' : ''}`);
      });
      righe.push('');
      righe.push('--- STORICO SESSIONI (dalla più recente) ---');
      (log.data||[]).forEach(v=>{
        const dettagli = v.peso!=null ? `${v.peso}kg × ${v.serie ?? '?'}×${v.ripetizioni ?? '?'}` : (v.rpe!=null ? `${v.specialita ? v.specialita+' · ' : ''}RPE ${v.rpe}/10` : (v.fatto ? 'fatto' : 'non fatto'));
        righe.push(`${v.data} · ${v.esercizi?.nome || '—'} · ${dettagli}${v.nota ? ' · nota: '+v.nota : ''}`);
      });
      await condividiOScarica(`diario_riepilogo.txt`, righe.join('\n'), 'text/plain');
    }catch(e){ alert('Errore export: '+(e.message||e)); }
  };
  document.getElementById('cMostraImporta').onclick = ()=>{
    document.getElementById('areaImporta').style.display = 'block';
  };
  document.getElementById('cConfermaImporta').onclick = ()=>{
    const testo = document.getElementById('cTestoImporta').value.trim();
    const erroreBox = document.getElementById('iErrore');
    let payload;
    try{ payload = JSON.parse(testo); }
    catch(e){ erroreBox.textContent='JSON non valido.'; erroreBox.style.display='block'; return; }
    confermaGenerica('Questo sostituirà TUTTI i dati attuali con quelli del file importato.', 'Sostituisci', async ()=>{
      try{
        await conRetry(()=> sb.rpc('ripristina_backup', {payload}));
        chiudiModale();
        alert('Importazione completata.');
        mostraVista(stato.vistaCorrente);
      }catch(e){ alert('Errore import: '+(e.message||e)); }
    });
  };
}

  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
window.addEventListener('online', ()=> impostaConnessione(true));
window.addEventListener('offline', ()=> impostaConnessione(false));

   ============================================================ */
renderDiario();
</script>
